services:
  whale-monitor:
    build: .
    container_name: btc-whale-monitor
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    volumes:
      - whale_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8000/health'); r.raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  whale_data:
